{% extends "cv_sorter/base.html" %}

{% block title %}Sign In{% endblock %}

{% block content %}
<div style="min-height:calc(100vh - 58px); display:flex; align-items:center; justify-content:center; padding:40px 24px;">
  <div style="width:100%; max-width:400px;">

    <div style="text-align:center; margin-bottom:32px;">
      <div style="display:inline-flex; align-items:center; justify-content:center; width:52px; height:52px; background:transparent; border:1px solid var(--border); border-radius:12px; margin-bottom:20px;">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
      </div>
      <h1 style="font-size:26px; font-weight:700; color:var(--text); margin-bottom:8px;">Welcome back</h1>
      <p style="font-size:14px; color:var(--muted);">Sign in to your HIRE.AI workspace</p>
    </div>

    <div class="card" style="padding:32px;">
      {% if form.errors %}
      <div class="alert alert-error" style="margin-bottom:20px;">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Username atau password tidak valid.
      </div>
      {% endif %}

      <form method="post" style="display:flex; flex-direction:column; gap:18px;">
        {% csrf_token %}
        <div>
          <label class="label" for="id_username">Username</label>
          <input class="input" type="text" name="username" id="id_username" placeholder="Masukkan username" autocomplete="username" required>
        </div>
        <div>
          <label class="label" for="id_password">Password</label>
          <input class="input" type="password" name="password" id="id_password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:11px; margin-top:4px;">
          Sign In
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
        </button>
      </form>
    </div>

    <p style="text-align:center; font-size:12px; color:var(--subtle); margin-top:20px;">
      Akses terbatas untuk tim rekrutmen internal.
    </p>
  </div>
</div>
{% endblock %}
